<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>防诈知识测试问卷</title>
    <style>
        :root {
            --primary: #1a73e8;
            --primary-dark: #1557b0;
            --danger: #d93025;
            --success: #188038;
            --warning: #e37400;
            --bg: #f0f4f8;
            --card-bg: #ffffff;
            --text: #202124;
            --text-secondary: #5f6368;
            --border: #dadce0;
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.08);
            --shadow-lg: 0 8px 30px rgba(0, 0, 0, 0.12);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.2s ease;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', 'Helvetica Neue', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.7;
            min-height: 100vh;
            -webkit-font-smoothing: antialiased;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, #1a3c5e 0%, #1a5c8a 40%, #1a73b8 100%);
            color: #fff;
            padding: 28px 20px 24px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.2);
        }
        .header .icon-shield {
            font-size: 42px;
            display: block;
            margin-bottom: 6px;
        }
        .header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            letter-spacing: 0.5px;
            margin: 0;
        }
        .header .subtitle {
            font-size: 0.85rem;
            opacity: 0.9;
            margin-top: 4px;
        }

        /* Main container */
        .container {
            max-width: 780px;
            margin: 0 auto;
            padding: 16px 16px 40px;
        }

        /* Card */
        .card {
            background: var(--card-bg);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: 24px 20px;
            margin-bottom: 16px;
            border: 1px solid var(--border);
            transition: var(--transition);
        }
        .card:hover {
            box-shadow: var(--shadow-lg);
        }
        .card-title {
            font-size: 1.1rem;
            font-weight: 700;
            color: #1a3c5e;
            margin-bottom: 14px;
            padding-bottom: 10px;
            border-bottom: 2px solid #e8edf2;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card-title .badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            background: var(--primary);
            color: #fff;
            font-size: 0.75rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            white-space: nowrap;
        }
        .card-title .badge.judge {
            background: #5c6bc0;
        }
        .card-title .badge.single {
            background: #26a69a;
        }
        .card-title .badge.multi {
            background: #ef6c00;
        }
        .card-title .badge.fill {
            background: #7b1fa2;
        }

        /* Form groups */
        .form-group {
            margin-bottom: 14px;
        }
        .form-group label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 5px;
            color: #333;
        }
        .form-group select,
        .form-group input[type="text"],
        .form-group input[type="number"] {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.95rem;
            transition: var(--transition);
            background: #fafbfc;
            font-family: inherit;
        }
        .form-group select:focus,
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(26, 115, 232, 0.1);
            background: #fff;
        }

        .required-mark {
            color: #d93025;
            font-weight: bold;
        }

        /* Question block */
        .question-block {
            padding: 14px 16px;
            margin-bottom: 10px;
            border-radius: var(--radius-sm);
            background: #fafbfc;
            border-left: 4px solid transparent;
            transition: var(--transition);
            position: relative;
        }
        .question-block.judge-q {
            border-left-color: #5c6bc0;
        }
        .question-block.single-q {
            border-left-color: #26a69a;
        }
        .question-block.multi-q {
            border-left-color: #ef6c00;
        }
        .question-block.fill-q {
            border-left-color: #7b1fa2;
        }
        .question-block .q-num {
            font-weight: 700;
            color: #333;
            font-size: 0.9rem;
            margin-bottom: 4px;
        }
        .question-block .q-text {
            font-size: 0.9rem;
            color: #333;
            margin-bottom: 8px;
            line-height: 1.6;
        }
        .question-block .options {
            display: flex;
            flex-wrap: wrap;
            gap: 10px 18px;
        }
        .question-block .options label {
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            font-size: 0.9rem;
            padding: 6px 12px;
            border-radius: 20px;
            transition: var(--transition);
            background: #fff;
            border: 1.5px solid #e0e0e0;
            user-select: none;
        }
        .question-block .options label:hover {
            background: #e8f0fe;
            border-color: #a8c8f0;
        }
        .question-block .options label input {
            accent-color: var(--primary);
            width: 16px;
            height: 16px;
        }
        .question-block .options label:has(input:checked) {
            background: #e3edfb;
            border-color: var(--primary);
            font-weight: 600;
        }
        .question-block.fill-q textarea {
            width: 100%;
            min-height: 80px;
            padding: 10px;
            border: 2px solid var(--border);
            border-radius: var(--radius-sm);
            font-size: 0.9rem;
            font-family: inherit;
            resize: vertical;
            background: #fafbfc;
            transition: var(--transition);
        }
        .question-block.fill-q textarea:focus {
            outline: none;
            border-color: #7b1fa2;
            box-shadow: 0 0 0 3px rgba(123, 31, 162, 0.08);
            background: #fff;
        }
        .fill-ref {
            background: #fef9e7;
            border: 1px dashed #e0c36a;
            border-radius: 6px;
            padding: 10px 14px;
            font-size: 0.85rem;
            color: #5d4e37;
            margin-bottom: 8px;
            line-height: 1.7;
            letter-spacing: 0.3px;
            white-space: pre-wrap;
            word-break: break-all;
        }
        .fill-ref .ref-label {
            font-weight: 700;
            color: #7b5e1b;
            display: block;
            margin-bottom: 2px;
            font-size: 0.78rem;
        }

        /* Submit button */
        .submit-wrap {
            text-align: center;
            padding: 10px 0 30px;
        }
        .btn-submit {
            display: inline-block;
            padding: 14px 50px;
            font-size: 1.1rem;
            font-weight: 700;
            color: #fff;
            background: linear-gradient(135deg, #1a73e8, #1557b0);
            border: none;
            border-radius: 30px;
            cursor: pointer;
            letter-spacing: 1px;
            transition: all 0.25s ease;
            box-shadow: 0 4px 16px rgba(26, 115, 232, 0.35);
            font-family: inherit;
        }
        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 28px rgba(26, 115, 232, 0.45);
            background: linear-gradient(135deg, #1d7ef0, #1665c4);
        }
        .btn-submit:active {
            transform: translateY(0);
            box-shadow: 0 3px 10px rgba(26, 115, 232, 0.3);
        }

        /* Result panel */
        .result-panel {
            display: none;
            background: #fff;
            border-radius: var(--radius);
            box-shadow: var(--shadow-lg);
            padding: 28px 22px;
            margin-bottom: 20px;
            border: 2px solid #e0e0e0;
            animation: fadeInUp 0.4s ease;
        }
        .result-panel.show {
            display: block;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .result-header {
            text-align: center;
            margin-bottom: 20px;
        }
        .result-score {
            font-size: 3.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            line-height: 1;
        }
        .result-score.excellent {
            color: #188038;
        }
        .result-score.good {
            color: #1a73e8;
        }
        .result-score.fair {
            color: #e37400;
        }
        .result-score.pass {
            color: #c26400;
        }
        .result-score.fail {
            color: #d93025;
        }
        .result-grade {
            font-size: 1.2rem;
            font-weight: 600;
            margin-top: 4px;
        }
        .result-breakdown {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 18px;
            font-size: 0.85rem;
            color: #5f6368;
        }
        .result-breakdown span {
            background: #f1f3f4;
            padding: 6px 14px;
            border-radius: 16px;
            font-weight: 500;
        }
        .result-msg {
            text-align: center;
            font-size: 0.95rem;
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 14px;
            line-height: 1.6;
        }
        .result-msg.excellent {
            background: #e6f4ea;
            color: #1e4620;
        }
        .result-msg.good {
            background: #e8f0fe;
            color: #1a3c5e;
        }
        .result-msg.fair {
            background: #fef7e0;
            color: #5d3a00;
        }
        .result-msg.fail {
            background: #fce8e6;
            color: #5c1a1a;
        }

        /* Detail toggle */
        .detail-toggle {
            display: block;
            width: 100%;
            padding: 10px;
            background: #f5f7f9;
            border: 1px solid #dadce0;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 600;
            color: #444;
            text-align: center;
            transition: var(--transition);
            font-family: inherit;
        }
        .detail-toggle:hover {
            background: #e8ecf1;
        }
        .detail-section {
            display: none;
            margin-top: 12px;
        }
        .detail-section.open {
            display: block;
        }
        .detail-item {
            padding: 8px 10px;
            margin: 4px 0;
            border-radius: 6px;
            font-size: 0.82rem;
            line-height: 1.5;
            display: flex;
            align-items: flex-start;
            gap: 8px;
        }
        .detail-item.correct {
            background: #e6f4ea;
            border-left: 3px solid #188038;
        }
        .detail-item.wrong {
            background: #fce8e6;
            border-left: 3px solid #d93025;
        }
        .detail-item .icon-result {
            font-size: 1rem;
            flex-shrink: 0;
            margin-top: 1px;
        }
        .detail-item .detail-text {
            flex: 1;
        }
        .detail-item .detail-text .correct-ans {
            color: #188038;
            font-weight: 600;
        }
        .detail-item .detail-text .wrong-ans {
            color: #d93025;
            font-weight: 600;
        }

        /* Scroll to top */
        .scroll-top {
            position: fixed;
            bottom: 24px;
            right: 24px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--primary);
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 1.3rem;
            box-shadow: 0 4px 14px rgba(0, 0, 0, 0.2);
            transition: var(--transition);
            z-index: 99;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .scroll-top:hover {
            background: var(--primary-dark);
            transform: translateY(-3px);
        }

        /* Responsive */
        @media (max-width: 600px) {
            .header h1 {
                font-size: 1.3rem;
            }
            .card {
                padding: 16px 12px;
            }
            .question-block {
                padding: 10px 10px;
            }
            .question-block .options {
                gap: 6px 10px;
            }
            .question-block .options label {
                font-size: 0.8rem;
                padding: 5px 10px;
            }
            .result-score {
                font-size: 2.8rem;
            }
            .btn-submit {
                padding: 12px 36px;
                font-size: 1rem;
            }
        }

        /* Print styles */
        @media print {
            .header {
                position: static;
                background: #fff !important;
                color: #000 !important;
                box-shadow: none;
                border-bottom: 2px solid #000;
            }
            .btn-submit,
            .scroll-top,
            .detail-toggle {
                display: none !important;
            }
            .card {
                box-shadow: none;
                border: 1px solid #ccc;
                break-inside: avoid;
            }
            body {
                background: #fff;
            }
        }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <span class="icon-shield">🛡️</span>
        <h1>防诈知识测试问卷</h1>
        <p class="subtitle">提高防范意识 · 远离电信诈骗 · 守护财产安全</p>
    </div>

    <!-- Main Container -->
    <div class="container" id="mainContainer">

        <!-- 结果面板（初始隐藏） -->
        <div class="result-panel" id="resultPanel">
            <div class="result-header">
                <div class="result-score" id="resultScore">--</div>
                <div class="result-grade" id="resultGrade"></div>
            </div>
            <div class="result-breakdown" id="resultBreakdown"></div>
            <div class="result-msg" id="resultMsg"></div>
            <button class="detail-toggle" id="detailToggle" onclick="toggleDetail()">
                📋 查看详细答题解析 ▼
            </button>
            <div class="detail-section" id="detailSection"></div>
        </div>

        <!-- 表单 -->
        <form id="quizForm" onsubmit="return false;">

            <!-- 基本信息 -->
            <div class="card">
                <div class="card-title">📝 基本信息</div>
                <div class="form-group">
                    <label><span class="required-mark">*</span> 个人身份：</label>
                    <select id="identity" required>
                        <option value="">请选择</option>
                        <option value="本科生">本科生</option>
                        <option value="硕士研究生">硕士研究生</option>
                        <option value="博士研究生">博士研究生</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><span class="required-mark">*</span> 所在年级：</label>
                    <select id="grade" required>
                        <option value="">请选择</option>
                        <option value="大一">大一</option>
                        <option value="大二">大二</option>
                        <option value="大三">大三</option>
                        <option value="大四">大四</option>
                        <option value="研一">研一</option>
                        <option value="研二">研二</option>
                        <option value="研三">研三</option>
                        <option value="博一">博一</option>
                        <option value="博二">博二</option>
                        <option value="博三">博三</option>
                        <option value="博四及以上">博四及以上</option>
                    </select>
                </div>
                <div class="form-group">
                    <label><span class="required-mark">*</span> 姓名：</label>
                    <input type="text" id="studentName" placeholder="请输入姓名" required maxlength="20">
                </div>
                <div class="form-group">
                    <label><span class="required-mark">*</span> 学号：</label>
                    <input type="text" id="studentId" placeholder="请输入学号（15字以内）" required maxlength="15">
                </div>
                <div class="form-group">
                    <label><span class="required-mark">*</span> 所在培养单位：</label>
                    <select id="department" required>
                        <option value="">请选择</option>
                        <option value="计算机学院">计算机学院</option>
                        <option value="电子信息工程学院">电子信息工程学院</option>
                        <option value="机械工程学院">机械工程学院</option>
                        <option value="经济管理学院">经济管理学院</option>
                        <option value="理学院">理学院</option>
                        <option value="文学院">文学院</option>
                        <option value="法学院">法学院</option>
                        <option value="医学院">医学院</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
            </div>

            <!-- 一、判断题 -->
            <div class="card">
                <div class="card-title"><span class="badge judge">判断题</span> 一、判断题（15题，每题2分，共30分）</div>
                <div id="judgeQuestions"></div>
            </div>

            <!-- 二、单项选择题 -->
            <div class="card">
                <div class="card-title"><span class="badge single">单选题</span> 二、单项选择题（15题，每题2分，共30分）</div>
                <div id="singleQuestions"></div>
            </div>

            <!-- 三、多项选择题 -->
            <div class="card">
                <div class="card-title"><span class="badge multi">多选题</span> 三、多项选择题（少选、多选、错选均不得分，10题，每题3分，共30分）</div>
                <div id="multiQuestions"></div>
            </div>

            <!-- 四、填空题 -->
            <div class="card">
                <div class="card-title"><span class="badge fill">填空题</span> 四、填空题（2题，每题5分，共10分）<br><small style="color:#7b1fa2;">请将以下文字完整、无误地进行抄录</small></div>
                <div id="fillQuestions"></div>
            </div>

            <!-- 提交按钮 -->
            <div class="submit-wrap">
                <button class="btn-submit" onclick="submitQuiz()">✅ 提交答卷并查看成绩</button>
            </div>
        </form>
    </div>

    <!-- 回到顶部 -->
    <button class="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})" title="回到顶部">↑</button>

    <script>
        // ==================== 题目数据 ====================
        // 判断题：{id, text, answer: true=正确, false=错误}
        const judgeQuestions = [
            { id: 1,
                text: '小陈发现网络兼职广告并下载APP后，看到"做任务领佣金"。因手头紧立刻按指引操作。',
            answer: false },
            { id: 2,
                text: '朱同学接到自称公安局警官的电话，称其银行卡有盗刷风险，需登录"智能警务系统APP"填写银行卡信息，为了保住财产，他依言操作。',
                answer: false },
            { id: 3,
                text: '小王计划去看演唱会，但并未成功抢到门票。心灰意冷的他在小红书看到一则工作人员转售余票的帖子，遂联系此人通过"内部工作人员"购买。',
                answer: false },
            { id: 4,
                text: '小孙在闲鱼求购限量球鞋，代购以"平台手续费高"为由要求微信交易，小孙担心诈骗，故与代购商量先给其微信转部分定金，收到货后再付尾款。',
            answer: false },
            { id: 5,
                text: '李同学接到一个电话，对方自称是学校财务处老师，说李同学有一笔奖学金没领，需要他提供银行卡号和密码。李同学立即拒绝，并拨打学校财务处官方电话反映。',
                answer: true },
            { id: 6,
                text: '小李看到低价出售二手苹果手机的帖子，十分心动，于是添加卖家微信。卖家发送购买记录和实物照片并确定交易金额后，让小李通过微信转定金，并称可以等到小李收到货后，再补全剩下金额。小李认为机会难得，迅速转账以免手机卖给别人。',
                answer: false },
            { id: 7,
                text: '小杨玩网络游戏时，看到游戏公屏上有人发布出售"全皮肤稀有账号"的消息，价格远低于市场价。小杨添加对方QQ好友后，对方发送了一个名为"某鱼官方担保平台"的链接，要求小杨在该网站上下单购买。小杨支付200元后，网站提示"资金冻结"，客服称需再充值500元"解冻费"才能提现和获得账号。为了要回200元并买到账号，小杨充值了500元。',
                answer: false },
            { id: 8,
                text: '小鲁接到自称XX航空公司客服的电话，客服表示小鲁的航班取消，现需退票或改签，并会补贴300元以表达歉意，小鲁认为既然能够领到补贴，尽快按照客服的要求操作改签新航班。',
                answer: false },
            { id: 9,
                text: '小美买连衣裙后，接到自称商家的电话，称"发错货需配合退款"，因对方能说出个人及订单信息，小美全程照做。',
            answer: false },
            { id: 10, text: '凡是要求你打开屏幕共享，指导你进行资金账户操作的，都是诈骗。', answer: true },
            { id: 11,
                text: '凌晨，小顾收到朋友QQ消息。对方发来已经给小顾转账5000元的支付截图，声称急需就医但微信限额，让小顾帮忙给指定银行账户转账5000元。小顾碍于情面，未进一步核实就给对方打款。',

                        <label><input type="radio" name="judge_${q.id}" value="true" required> ✅ 正确</label>
                        <label><input type="radio" name="judge_${q.id}" value="false"> ❌ 错误</label>
                    </div>
                </div>`;
            });
            container.innerHTML = html;
        }

        function renderSingleQuestions() {
            const container = document.getElementById('singleQuestions');
            let html = '';
            singleQuestions.forEach((q, idx) => {
                const optionLabels = ['A', 'B', 'C', 'D'];
                html += `
                <div class="question-block single-q">
                    <div class="q-num">第${idx+16}题（2分）</div>
                    <div class="q-text">${q.id}．${q.text}</div>
                    <div class="options">`;
                q.options.forEach((opt, oi) => {
                    html +=
                        `<label><input type="radio" name="single_${q.id}" value="${optionLabels[oi]}" required> ${opt}</label>`;
                });
                html += `</div></div>`;
            });
            container.innerHTML = html;
        }

        function renderMultiQuestions() {
            const container = document.getElementById('multiQuestions');
            let html = '';
            multiQuestions.forEach((q, idx) => {
                const optionLabels = ['A', 'B', 'C', 'D'];
                html += `
                <div class="question-block multi-q">
                    <div class="q-num">第${idx+31}题（3分）<span style="color:#d93025;font-size:0.8rem;"> [多选题]</span></div>
                    <div class="q-text">${q.id}．${q.text}</div>
                    <div class="options">`;
                q.options.forEach((opt, oi) => {
                    html +=
                        `<label><input type="checkbox" name="multi_${q.id}" value="${optionLabels[oi]}"> ${opt}</label>`;
                });
                html += `</div></div>`;
            });
            container.innerHTML = html;
        }

        function renderFillQuestions() {
            const container = document.getElementById('fillQuestions');
            let html = '';
            fillQuestions.forEach((q, idx) => {
                html += `
                <div class="question-block fill-q">
                    <div class="q-num">第${idx+1}题（5分）</div>
                    <div class="fill-ref">
                        <span class="ref-label">📌 请抄录以下文字：</span>
                        ${q.refText}
                    </div>
                    <textarea name="fill_${q.id}" placeholder="请在此处完整抄录上述文字..." required></textarea>
                </div>`;
            });
            container.innerHTML = html;
        }

        // ==================== 评分子系统 ====================
        function getJudgeScore(answers) {
            let score = 0;
            const details = [];
            judgeQuestions.forEach(q => {
                const userVal = answers[`judge_${q.id}`];
                let userAnswer = null;
                if (userVal === 'true') userAnswer = true;
                if (userVal === 'false') userAnswer = false;
                const correct = (userAnswer === q.answer);
                if (correct) score += 2;
                details.push({
                    id: q.id,
                    type: 'judge',
                    correct,
                    userAnswer: userAnswer === true ? '正确' : (userAnswer === false ? '错误' : '未作答'),
                    correctAnswer: q.answer ? '正确' : '错误',
                    text: q.text,
                });
            });
            return { score, details };
        }

        function getSingleScore(answers) {
            let score = 0;
            const details = [];
            singleQuestions.forEach(q => {
                const userAnswer = answers[`single_${q.id}`] || '未作答';
                const correct = (userAnswer === q.answer);
                if (correct) score += 2;
                details.push({
                    id: q.id,
                    type: 'single',
                    correct,
                    userAnswer,
                    correctAnswer: q.answer,
                    text: q.text,
                    options: q.options,
                });
            });
            return { score, details };
        }

        function getMultiScore(answers) {
            let score = 0;
            const details = [];
            multiQuestions.forEach(q => {
                const raw = answers[`multi_${q.id}`];
                let userAnswers = [];
                if (raw) {
                    if (Array.isArray(raw)) {
                        userAnswers = raw.sort();
                    } else {
                        userAnswers = [raw].sort();
                    }
                }
                const correctAnswers = [...q.answer].sort();
                const correct = (JSON.stringify(userAnswers) === JSON.stringify(correctAnswers));
                if (correct) score += 3;
                details.push({
                    id: q.id,
                    type: 'multi',
                    correct,
                    userAnswer: userAnswers.join(', ') || '未作答',
                    correctAnswer: correctAnswers.join(', '),
                    text: q.text,
                });
            });
            return { score, details };
        }

        function getFillScore(answers) {
            let score = 0;
            const details = [];
            fillQuestions.forEach(q => {
                const userText = (answers[`fill_${q.id}`] || '').trim();
                const refText = q.refText.trim();
                const similarity = calcSimilarity(userText, refText);
                let earned = 0;
                if (similarity >= 0.95) earned = 5;
                else if (similarity >= 0.80) earned = 3;
                else earned = 0;
                score += earned;
                details.push({
                    id: q.id,
                    type: 'fill',
                    earned,
                    maxScore: 5,
                    similarity,
                    userText,
                    refText,
                });
            });
            return { score, details };
        }

        function calcSimilarity(str1, str2) {
            if (!str1 && !str2) return 1;
            if (!str1 || !str2) return 0;
            const len1 = str1.length;
            const len2 = str2.length;
            const maxLen = Math.max(len1, len2);
            if (maxLen === 0) return 1;
            // 使用简单的动态规划计算编辑距离
            const dp = [];
            for (let i = 0; i <= len1; i++) {
                dp[i] = [i];
            }
            for (let j = 0; j <= len2; j++) {
                dp[0][j] = j;
            }
            for (let i = 1; i <= len1; i++) {
                for (let j = 1; j <= len2; j++) {
                    const cost = str1[i - 1] === str2[j - 1] ? 0 : 1;
                    dp[i][j] = Math.min(
                        dp[i - 1][j] + 1,
                        dp[i][j - 1] + 1,
                        dp[i - 1][j - 1] + cost
                    );
                }
            }
            const distance = dp[len1][len2];
            return 1 - distance / maxLen;
        }

        // ==================== 提交与评分 ====================
        function submitQuiz() {
            // 验证基本信息
            const identity = document.getElementById('identity').value;
            const grade = document.getElementById('grade').value;
            const studentName = document.getElementById('studentName').value.trim();
            const studentId = document.getElementById('studentId').value.trim();
            const department = document.getElementById('department').value;

            if (!identity || !grade || !studentName || !studentId || !department) {
                alert('请完整填写基本信息后再提交！');
                return;
            }

            // 收集所有答案
            const form = document.getElementById('quizForm');
            const formData = new FormData(form);
            const answers = {};
            for (const [key, value] of formData.entries()) {
                if (key.startsWith('multi_')) {
                    if (!answers[key]) answers[key] = [];
                    answers[key].push(value);
                } else {
                    answers[key] = value;
                }
            }

            // 检查是否有未作答的题目
            let unanswered = [];
            judgeQuestions.forEach(q => {
                if (!answers[`judge_${q.id}`]) unanswered.push(`判断题第${q.id}题`);
            });
            singleQuestions.forEach(q => {
                if (!answers[`single_${q.id}`]) unanswered.push(`单选题第${q.id}题`);
            });
            multiQuestions.forEach(q => {
                if (!answers[`multi_${q.id}`] || answers[`multi_${q.id}`].length === 0)
                    unanswered.push(`多选题第${q.id}题`);
            });
            fillQuestions.forEach(q => {
                if (!answers[`fill_${q.id}`] || answers[`fill_${q.id}`].trim() === '')
                    unanswered.push(`填空题第${q.id}题`);
            });

            if (unanswered.length > 0) {
                const confirmSubmit = confirm(
                    `以下题目尚未作答：\n${unanswered.slice(0,8).join('、')}${unanswered.length>8?'...等共'+unanswered.length+'题':''}\n\n未作答的题目将计0分，确定提交吗？`
                    );
                if (!confirmSubmit) return;
            }

            // 评分
            const judgeResult = getJudgeScore(answers);
            const singleResult = getSingleScore(answers);
            const multiResult = getMultiScore(answers);
            const fillResult = getFillScore(answers);

            const totalScore = judgeResult.score + singleResult.score + multiResult.score + fillResult.score;
            const maxScore = 100;
            const allDetails = [
                ...judgeResult.details,
                ...singleResult.details,
                ...multiResult.details,
                ...fillResult.details,
            ];

            // 等级评定
            let gradeText, gradeClass, msgText, msgClass;
            if (totalScore >= 90) {
                gradeText = '🏆 优秀';
                gradeClass = 'excellent';
                msgText = '恭喜！您的防诈意识非常强，对各类诈骗手段有清晰的认识，请继续保持警惕！';
                msgClass = 'excellent';
            } else if (totalScore >= 80) {
                gradeText = '👍 良好';
                gradeClass = 'good';
                msgText = '您的防诈意识较好，但仍有提升空间，建议对薄弱环节加强学习。';
                msgClass = 'good';
            } else if (totalScore >= 70) {
                gradeText = '📖 一般';
                gradeClass = 'fair';
                msgText = '您的防诈意识一般，部分诈骗手段可能让您陷入圈套，需要加强防诈知识学习。';
                msgClass = 'fair';
            } else if (totalScore >= 60) {
                gradeText = '⚠️ 及格';
                gradeClass = 'pass';
                msgText = '您的防诈意识有待提高，请认真复习防诈知识，提高警惕。';
                msgClass = 'fair';
            } else {
                gradeText = '🚨 不及格';
                gradeClass = 'fail';
                msgText = '您的防诈意识较为薄弱，极易成为诈骗分子的目标！请务必重视并系统学习防诈知识，保护好个人财产安全！';
                msgClass = 'fail';
            }

            // 显示结果
            const resultPanel = document.getElementById('resultPanel');
            resultPanel.classList.add('show');
            document.getElementById('resultScore').textContent = totalScore + ' / ' + maxScore;
            document.getElementById('resultScore').className = 'result-score ' + gradeClass;
            document.getElementById('resultGrade').textContent = gradeText;
            document.getElementById('resultGrade').className = 'result-grade ' + gradeClass;
            document.getElementById('resultBreakdown').innerHTML = `
                <span>📋 判断题：${judgeResult.score}/30</span>
                <span>📝 单选题：${singleResult.score}/30</span>
                <span>🔢 多选题：${multiResult.score}/30</span>
                <span>✍️ 填空题：${fillResult.score}/10</span>
            `;
            const msgEl = document.getElementById('resultMsg');
            msgEl.textContent = msgText;
            msgEl.className = 'result-msg ' + msgClass;

            // 渲染详细解析
            const detailSection = document.getElementById('detailSection');
            let detailHtml = '';
            allDetails.forEach(d => {
                if (d.type === 'judge') {
                    detailHtml += `
                    <div class="detail-item ${d.correct?'correct':'wrong'}">
                        <span class="icon-result">${d.correct?'✅':'❌'}</span>
                        <span class="detail-text">
                            <strong>判断题第${d.id}题</strong>：${d.text}<br>
                            您的答案：<span class="${d.correct?'correct-ans':'wrong-ans'}">${d.userAnswer}</span> | 
                            正确答案：<span class="correct-ans">${d.correctAnswer}</span>
                        </span>
                    </div>`;
                } else if (d.type === 'single') {
                    detailHtml += `
                    <div class="detail-item ${d.correct?'correct':'wrong'}">
                        <span class="icon-result">${d.correct?'✅':'❌'}</span>
                        <span class="detail-text">
                            <strong>单选题第${d.id}题</strong>：${d.text}<br>
                            您的答案：<span class="${d.correct?'correct-ans':'wrong-ans'}">${d.userAnswer}</span> | 
                            正确答案：<span class="correct-ans">${d.correctAnswer}</span>
                        </span>
                    </div>`;
                } else if (d.type === 'multi') {
                    detailHtml += `
                    <div class="detail-item ${d.correct?'correct':'wrong'}">
                        <span class="icon-result">${d.correct?'✅':'❌'}</span>
                        <span class="detail-text">
                            <strong>多选题第${d.id}题</strong>：${d.text}<br>
                            您的答案：<span class="${d.correct?'correct-ans':'wrong-ans'}">${d.userAnswer||'未作答'}</span> | 
                            正确答案：<span class="correct-ans">${d.correctAnswer}</span>
                            ${!d.correct?'<br><small style="color:#888;">（少选、多选、错选均不得分）</small>':''}
                        </span>
                    </div>`;
                } else if (d.type === 'fill') {
                    const simPercent = Math.round(d.similarity * 100);
                    detailHtml += `
                    <div class="detail-item ${d.earned>=5?'correct':(d.earned>0?'correct':'wrong')}">
                        <span class="icon-result">${d.earned>=5?'✅':(d.earned>0?'⚠️':'❌')}</span>
                        <span class="detail-text">
                            <strong>填空题第${d.id}题</strong>：得分 ${d.earned}/5（相似度：${simPercent}%）<br>
                            ${d.earned<5?`<span style="color:#d93025;">您的抄写与原文存在差异，请仔细核对。</span>`:'抄写完全正确！'}
                        </span>
                    </div>`;
                }
            });
            detailSection.innerHTML = detailHtml;
            document.getElementById('detailSection').classList.remove('open');

            // 滚动到结果面板
            resultPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });

            // 禁用表单修改
            disableForm();
        }

        function toggleDetail() {
            const detailSection = document.getElementById('detailSection');
            const toggleBtn = document.getElementById('detailToggle');
            if (detailSection.classList.contains('open')) {
                detailSection.classList.remove('open');
                toggleBtn.textContent = '📋 查看详细答题解析 ▼';
            } else {
                detailSection.classList.add('open');
                toggleBtn.textContent = '📋 收起详细答题解析 ▲';
                detailSection.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }

        function disableForm() {
            const form = document.getElementById('quizForm');
            const inputs = form.querySelectorAll('input, select, textarea');
            inputs.forEach(el => el.disabled = true);
            const submitBtn = form.querySelector('.btn-submit');
            if (submitBtn) {
                submitBtn.disabled = true;
                submitBtn.textContent = '✅ 已提交';
                submitBtn.style.opacity = '0.6';
                submitBtn.style.cursor = 'not-allowed';
                submitBtn.style.pointerEvents = 'none';
            }
        }

        // ==================== 初始化 ====================
        function init() {
            renderJudgeQuestions();
            renderSingleQuestions();
            renderMultiQuestions();
            renderFillQuestions();
        }

        document.addEventListener('DOMContentLoaded', init);

        // 滚动监听：回到顶部按钮
        window.addEventListener('scroll', function() {
            const btn = document.querySelector('.scroll-top');
            if (window.scrollY > 400) {
                btn.style.opacity = '1';
                btn.style.pointerEvents = 'auto';
            } else {
                btn.style.opacity = '0';
                btn.style.pointerEvents = 'none';
            }
        });
        // 初始状态
        document.querySelector('.scroll-top').style.opacity = '0';
        document.querySelector('.scroll-top').style.pointerEvents = 'none';
    </script>
